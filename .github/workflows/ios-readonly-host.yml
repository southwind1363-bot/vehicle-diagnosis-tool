name: iOS Read-Only Host

on:
  push:
    branches: [main]
    paths:
      - "native/ios/**"
      - ".github/workflows/ios-readonly-host.yml"
  pull_request:
    paths:
      - "native/ios/**"
      - ".github/workflows/ios-readonly-host.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build iPhone BLE host
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install verified XcodeGen
        run: |
          curl --fail --location --silent --show-error https://github.com/yonaskolb/XcodeGen/releases/download/2.46.0/xcodegen.zip --output /tmp/xcodegen.zip
          echo "4d9e34b62172d645eed6457cac13fc222569974098ef4ee9c3368bedf0196806  /tmp/xcodegen.zip" | shasum -a 256 --check
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen
          echo "/tmp/xcodegen/xcodegen/bin" >> "$GITHUB_PATH"

      - name: Validate Bluetooth permission manifest
        run: plutil -lint Sources/Info.plist
        working-directory: native/ios/ELM327BLEHost

      - name: Generate host project
        run: xcodegen generate
        working-directory: native/ios/ELM327BLEHost

      - name: Build read-only host for iOS Simulator
        run: |
          set +e
          set -o pipefail
          xcodebuild -project ELM327BLEHost.xcodeproj -scheme ELM327BLEHost -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build 2>&1 | tee /tmp/elm327blehost-xcodebuild.log
          build_status=${PIPESTATUS[0]}
          set -e
          if [ "$build_status" -ne 0 ]; then
            details=$(grep -E '(^| )((fatal )?error:|.*\.swift:[0-9]+:[0-9]+:)' /tmp/elm327blehost-xcodebuild.log | tail -n 12 | cut -c 1-600 | tr '\n' ' ')
            if [ -z "$details" ]; then details=$(tail -n 12 /tmp/elm327blehost-xcodebuild.log | cut -c 1-600 | tr '\n' ' '); fi
            echo "::error title=iOS host build failure::${details:-xcodebuild failed without a compiler diagnostic}"
            exit "$build_status"
          fi
        working-directory: native/ios/ELM327BLEHost

      - name: Test read-only connector for iOS Simulator
        run: |
          set +e
          set -o pipefail
          xcodebuild -project ELM327BLEHost.xcodeproj -scheme ELM327BLEConnectorTests -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' CODE_SIGNING_ALLOWED=NO test 2>&1 | tee /tmp/elm327bleconnector-tests.log
          test_status=${PIPESTATUS[0]}
          set -e
          if [ "$test_status" -ne 0 ]; then
            details=$(grep -E '(^| )((fatal )?error:|.*\.swift:[0-9]+:[0-9]+:|Testing failed:|Unable to find a destination)' /tmp/elm327bleconnector-tests.log | tail -n 12 | cut -c 1-600 | tr '\n' ' ')
            if [ -z "$details" ]; then details=$(tail -n 12 /tmp/elm327bleconnector-tests.log | cut -c 1-600 | tr '\n' ' '); fi
            echo "::error title=iOS connector test failure::${details:-xcodebuild test failed without a diagnostic}"
            exit "$test_status"
          fi
        working-directory: native/ios/ELM327BLEHost
