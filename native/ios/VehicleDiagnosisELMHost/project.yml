name: VehicleDiagnosisELMHost
options:
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: com.mukiguri.VehicleDiagnosisELMHost
targets:
  VehicleDiagnosisELMHost:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
    dependencies:
      - package: ELM327BLEConnector
        product: ELM327BLEConnector
packages:
  ELM327BLEConnector:
    path: ../ELM327BLEConnector
